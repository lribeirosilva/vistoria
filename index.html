<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Relatório de Vistoria Veicular</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; background-color: #f0f2f5; }
        .card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 32px rgba(0,0,0,0.1); width: 100%; max-width: 400px; text-align: center; }
        .preview-container { display: flex; justify-content: center; gap: 10px; margin: 20px 0; flex-wrap: wrap; }
        .preview-img { width: 60px; height: 60px; object-fit: cover; border-radius: 8px; border: 2px solid #ddd; }
        .btn { display: block; width: 100%; padding: 15px; margin: 10px 0; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 16px; transition: 0.3s; box-sizing: border-box; }
        .btn-camera { background-color: #28a745; color: white; }
        .btn-pdf { background-color: #007bff; color: white; display: none; }
        .btn-extra { background-color: #ffc107; color: #212529; display: none; }
        .input-group { text-align: left; margin-bottom: 15px; }
        .input-group label { font-size: 14px; color: #666; font-weight: bold; display: block; margin-bottom: 5px; }
        .input-group input { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
        #area-finalizacao { display: none; margin-top: 20px; border-top: 1px solid #eee; padding-top: 15px; }
        .desc-dano-container { display: none; background: #fff3cd; padding: 10px; border-radius: 8px; margin-bottom: 10px; border: 1px solid #ffeeba; }
        table { width: 100%; border-collapse: collapse; }
        td { padding: 8px; border-bottom: 1px solid #eee; text-align: left; font-size: 14px; }
        input[type="file"] { display: none; }
        #legenda { max-width: 100%; height: auto; margin-bottom: 10px; border-radius: 8px; }
    </style>
</head>
<body>

<div class="card">
    <h2>Relatório de Vistoria</h2>

    <div class="input-group">
        <label>Responsável:</label>
        <input type="text" id="nome-pessoa" placeholder="Nome completo">
    </div>
    <div class="input-group">
        <label>Nº Funcional:</label>
        <input type="text" id="num-funcional" placeholder="Identificação">
    </div>
    <div class="input-group">
        <label>Observação:</label>
        <input type="text" id="observacao" placeholder="Notas adicionais">
    </div>

    <form id="vistoriaForm">
        <table>
            <tr><td>Pneus em bom estado?</td><td><input type="radio" name="pneus" value="sim" checked>S <input type="radio" name="pneus" value="nao">N</td></tr>
            <tr><td>Luzes funcionando?</td><td><input type="radio" name="luzes" value="sim" checked>S <input type="radio" name="luzes" value="nao">N</td></tr>
            <tr><td>Estepe/Macaco OK?</td><td><input type="radio" name="estepe" value="sim" checked>S <input type="radio" name="estepe" value="nao">N</td></tr>
            <tr><td>Vidros sem trincas?</td><td><input type="radio" name="vidros" value="sim" checked>S <input type="radio" name="vidros" value="nao">N</td></tr>
            <tr><td>Níveis (Óleo/Água)?</td><td><input type="radio" name="niveis" value="sim" checked>S <input type="radio" name="niveis" value="nao">N</td></tr>
            <tr><td>Veículo lavado?</td><td><input type="radio" name="lavado" value="sim" checked>S <input type="radio" name="lavado" value="nao">N</td></tr>
        </table>
    </form>

    <div id="status" style="margin-top:15px; font-weight:bold; color:#007bff;">Tire a 1ª foto obrigatória</div>
    <div class="preview-container" id="previewContainer"></div>

    <img id="legenda" src="foto_1.png" alt="Guia de foto">

    <div id="container-texto-dano" class="desc-dano-container">
        <label>DESCREVA O DANO:</label>
        <input type="text" id="desc-dano" style="width:100%; padding:8px; border-radius:5px; border:1px solid #ccc; box-sizing: border-box;" placeholder="Ex: Riscos na porta">
    </div>

    <label for="camera-input" id="label-camera" class="btn btn-camera">📷 Tirar 1ª Foto</label>
    <input type="file" id="camera-input" accept="image/*" capture="environment">

    <button id="btn-foto-extra" class="btn btn-extra">⚠️ Adicionar Foto de Dano</button>

    <div id="area-finalizacao">
        <div class="input-group">
            <label>Nome do arquivo PDF:</label>
            <input type="text" id="nome-arquivo" placeholder="Ex: vistoria_abc1234">
        </div>
        <button id="btn-gerar-pdf" class="btn btn-pdf" onclick="gerarPDF()">📄 Salvar Relatório PDF</button>
    </div>
</div>

<script>
    const input = document.getElementById('camera-input');
    const status = document.getElementById('status');
    const previewContainer = document.getElementById('previewContainer');
    const btnPdf = document.getElementById('btn-gerar-pdf');
    const btnExtra = document.getElementById('btn-foto-extra');
    const labelCamera = document.getElementById('label-camera');
    const areaFinalizacao = document.getElementById('area-finalizacao');
    const descDanoInput = document.getElementById('desc-dano');
    const containerTextoDano = document.getElementById('container-texto-dano');
    const legendaImg = document.getElementById('legenda');

    let fotos = [];
    let descricoesDanos = [];
    const LIMITE_OBRIGATORIO = 6;
    const tiposObrigatorios = ["Painel", "Frente", "Lado Direito", "Lado Esquerdo", "Traseira", "Estepe"];

    input.addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = function(event) {
            const fotoBase64 = event.target.result;
            
            if (fotos.length >= LIMITE_OBRIGATORIO) {
                const texto = descDanoInput.value.trim() || "Dano não especificado";
                descricoesDanos.push(texto);
                descDanoInput.value = ""; 
            }

            fotos.push(fotoBase64);

            const imgTag = document.createElement('img');
            imgTag.src = fotoBase64;
            imgTag.className = 'preview-img';
            previewContainer.appendChild(imgTag);

            atualizarInterface();
        };
        reader.readAsDataURL(file);
        input.value = ""; 
    });

    function atualizarInterface() {
        const qtd = fotos.length;
        if (qtd < LIMITE_OBRIGATORIO) {
            status.innerText = `Foto ${qtd} de ${LIMITE_OBRIGATORIO} enviada.`;
            labelCamera.innerText = `📷 Tirar Foto: ${tiposObrigatorios[qtd]}`;
            legendaImg.src = `foto_${qtd+1}.png`;
        } else {
            legendaImg.src = `foto_7.png`;
            status.innerText = "Fotos obrigatórias concluídas.";
            labelCamera.style.display = "none";
            btnExtra.style.display = "block";
            containerTextoDano.style.display = "block";
            areaFinalizacao.style.display = "block";
            btnPdf.style.display = "block";
        }
    }

    btnExtra.onclick = () => {
        if (descDanoInput.value.trim() === "") {
            alert("Por favor, descreva o dano antes de tirar a foto.");
            descDanoInput.focus();
            return;
        }
        input.click();
    };

    async function gerarPDF() {
        const nomePessoa = document.getElementById('nome-pessoa').value;
        const numFuncional = document.getElementById('num-funcional').value;
        const txtObservacao = document.getElementById('observacao').value;
        const nomeArquivo = document.getElementById('nome-arquivo').value;

        if (!nomePessoa || !numFuncional || !nomeArquivo) {
            alert("Preencha o Responsável, Nº Funcional e Nome do Arquivo.");
            return;
        }

        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        const pageWidth = doc.internal.pageSize.getWidth();

        // Página 1: Dados
        doc.setFont("helvetica", "bold");
        doc.text("RELATÓRIO DE VISTORIA VEICULAR", pageWidth / 2, 20, { align: "center" });
        
        doc.setFontSize(10);
        doc.setFont("helvetica", "normal");
        let y = 40;
        doc.text(`Responsável: ${nomePessoa}`, 15, y); y += 7;
        doc.text(`Nº Funcional: ${numFuncional}`, 15, y); y += 7;
        doc.text(`Data: ${new Date().toLocaleDateString('pt-BR')}`, 15, y); y += 15;

        doc.setFont("helvetica", "bold");
        doc.text("CHECKLIST:", 15, y); y += 10;
        doc.setFont("helvetica", "normal");

        const formVistoria = new FormData(document.getElementById('vistoriaForm'));
        const labelsMap = {
            pneus: "Pneus em bom estado?",
            luzes: "Luzes e faróis funcionando?",
            estepe: "Possui estepe e macaco?",
            vidros: "Vidros sem trincas?",
            niveis: "Nível de óleo/água OK?",
            lavado: "Veículo lavado?"
        };

        formVistoria.forEach((valor, chave) => {
            const label = labelsMap[chave] || chave;
            doc.text(`${label} [ ${valor.toUpperCase()} ]`, 20, y);
            y += 7;
        });

        y += 10;
        doc.setFont("helvetica", "bold");
        doc.text("OBSERVAÇÕES:", 15, y); y += 7;
        doc.setFont("helvetica", "normal");
        const splitObs = doc.splitTextToSize(txtObservacao || "Sem observações adicionais.", pageWidth - 30);
        doc.text(splitObs, 15, y);
        
        // Rodapé
        doc.text(`Responsável: ${nomePessoa}`, pageWidth / 2, 285, { align: "center" });
        doc.text(`Nº Funcional/Identificação: ${numFuncional}`, pageWidth / 2, 290, { align: "center", setFontSize: 14 });

        // Páginas de Fotos
        fotos.forEach((foto, index) => {
            doc.addPage();
            let legendaTxt = "";
            
            if (index < LIMITE_OBRIGATORIO) {
                legendaTxt = `FOTO ${index + 1}: ${tiposObrigatorios[index].toUpperCase()}`;
            } else {
                const textoDano = descricoesDanos[index - LIMITE_OBRIGATORIO];
                legendaTxt = `DANO ADICIONAL: ${textoDano.toUpperCase()}`;
            }

            doc.setFont("helvetica", "bold");
            doc.setFontSize(12);
            doc.text(legendaTxt, 15, 20);
            
            // Adiciona a imagem (ajustado para caber na página mantendo proporção aproximada)
            try {
                doc.addImage(foto, 'JPEG', 15, 30, 180, 135);
            } catch (e) {
                console.error("Erro ao adicionar imagem", e);
            }
        });

        // Rodapé com assinatura simples em todas as páginas de fotos (opcional)
        const totalPaginas = doc.internal.getNumberOfPages();
        for(let i = 2; i <= totalPaginas; i++) {
            doc.setPage(i);
            doc.setFontSize(8);
            doc.text(`Responsável: ${nomePessoa}`, pageWidth / 2, 285, { align: "center" });
            doc.text(`Nº Funcional/Identificação: ${numFuncional}`, pageWidth / 2, 290, { align: "center", setFontSize: 14 });
        }
        // Rodapé na última página
        //doc.setFontSize(10);
        //doc.text(`${nomePessoa}`, pageWidth / 2, 275, { align: "center", setFontSize: 14 });
        //doc.text(`Responsável: ${nomePessoa} - Gerado via Sistema de Vistoria`, pageWidth / 2, 285, { align: "center" });
        

        doc.save(`${nomeArquivo}.pdf`);
    }
</script>

</body>
</html>
