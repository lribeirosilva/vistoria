<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Relatório de Vistoria Veicular</title>
    <script>
        (function() {
            const userAgent = navigator.userAgent || navigator.vendor || window.opera;

            // Expressão regular para identificar dispositivos móveis e tablets
            const isMobileOrTablet = /android|iphone|ipad|ipod|blackberry|iemobile|opera mini/i.test(userAgent.toLowerCase());

            if (!isMobileOrTablet) {
                /*
                document.body.innerHTML = `
                <div style="text-align:center; margin-top:100px; font-family: sans-serif;">
                    <h1>Acesso Negado</h1>
                    <p>Este sistema só pode ser acessado através de um celular/tablet.</p>
                    <img src="https://cdn-icons-png.flaticon.com/512/644/644617.png" width="100">
                </div>`;
                window.stop(); // Para o carregamento do restante do script
                */
                // Se NÃO for mobile/tablet, redireciona ou limpa a página
                alert("Acesso permitido apenas para celulares e tablets.");
                window.location.href = "https://www.google.com"; // Mude para a URL que desejar
            }
        })();
    </script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; background-color: #f0f2f5; }
        .card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 32px rgba(0,0,0,0.1); width: 100%; max-width: 400px; text-align: center; }
        .preview-container { display: flex; justify-content: center; gap: 10px; margin: 20px 0; flex-wrap: wrap; }
        .preview-img { width: 60px; height: 60px; object-fit: cover; border-radius: 8px; border: 2px solid #ddd; }
        .btn { display: block; width: 300; padding: 15px; margin: 10px 0; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 16px; transition: 0.3s; }
        .btn-camera { background-color: #28a745; color: white; }
        .btn-pdf { background-color: #007bff; color: white; display: none; }
        .btn-extra { background-color: #ffc107; color: #212529; display: none; }
        .input-group { text-align: left; margin-bottom: 15px; }
        .input-group label { font-size: 14px; color: #666; font-weight: bold; display: block; margin-bottom: 5px; }
        .input-group input { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
        #area-finalizacao { display: none; margin-top: 20px; border-top: 1px solid #eee; padding-top: 15px; }
        .desc-dano-container { display: none; background: #fff3cd; padding: 10px; border-radius: 8px; margin-bottom: 10px; border: 1px solid #ffeeba; }
        table { width: 100%; border-collapse: collapse; }
        td { padding: 8px; border-bottom: 1px solid #eee; text-align: left; font-size: 14px; }
        input[type="file"] { display: none; }
    </style>
</head>
<body>

<div class="card">
    <h2>Relatório de Vistoria Veicular</h2>

    <div class="input-group">
        <label>Responsável:</label>
        <input type="text" id="nome-pessoa" placeholder="Nome completo">
    </div>
    <div class="input-group">
        <label>Nº Funcional:</label>
        <input type="text" id="num-funcional" placeholder="Identificação">
    </div>

    <hr>

    <form id="vistoriaForm">
        <table>
            <tr><td class="input-group"><label>Pneus em bom estado?</label></td><td><input type="radio" name="pneus" value="sim" checked>Sim <input type="radio" name="pneus" value="nao">Não</td></tr>
            <tr><td class="input-group"><label>Luzes e faróis funcionando? </label></td><td><input type="radio" name="luzes" value="sim" checked>Sim <input type="radio" name="luzes" value="nao">Não</td></tr>
            <tr><td class="input-group"><label>Possui estepe e macaco?</label></td><td><input type="radio" name="estepe" value="sim" checked>Sim <input type="radio" name="estepe" value="nao">Não</td></tr>
            <tr><td class="input-group"><label>Vidros sem trincas?</label></td><td><input type="radio" name="vidros" value="sim" checked>Sim <input type="radio" name="vidros" value="nao">Não</td></tr>
            <tr><td class="input-group"><label>Nível de óleo/água OK?</label></td><td><input type="radio" name="niveis" value="sim" checked>Sim <input type="radio" name="niveis" value="nao">Não</td></tr>
        </table>
    </form>

    <hr>

    
    <div id="status">Tire a 1ª foto obrigatória</div>
    <div class="preview-container" id="previewContainer"></div>

    <img id="legenda" src="foto_1.png" style="height: 70%; width:70%;"></img>

    <div id="container-texto-dano" class="desc-dano-container">
        <label style="font-size: 12px; font-weight: bold;">DESCREVA O DANO ANTES DE TIRAR A FOTO:</label>
        <input type="text" id="desc-dano" style="width:300; padding:8px; border-radius:5px; border:1px solid #ccc;" placeholder="Ex: Riscos na porta direita">
    </div>

    <label for="camera-input" id="label-camera" class="btn btn-camera">📷 Tirar 1ª Foto</label>
    <input type="file" id="camera-input" accept="image/*" capture="environment">

    <button id="btn-foto-extra" class="btn btn-extra">⚠️ Adicionar Foto de Dano</button>

    <div id="area-finalizacao">
        <div class="input-group">
            <label>Nome do arquivo PDF:</label>
            <input type="text" id="nome-arquivo" placeholder="Ex: vistoria_01">
        </div>
        <button id="btn-gerar-pdf" class="btn btn-pdf" onclick="gerarPDF()">📄 Salvar PDF</button>
    </div>
</div>

<script>
    const input = document.getElementById('camera-input');
    const status = document.getElementById('status');
    const previewContainer = document.getElementById('previewContainer');
    const btnPdf = document.getElementById('btn-gerar-pdf');
    const btnExtra = document.getElementById('btn-foto-extra');
    const labelCamera = document.getElementById('label-camera');
    const areaFinalizacao = document.getElementById('area-finalizacao');
    const descDanoInput = document.getElementById('desc-dano');
    const containerTextoDano = document.getElementById('container-texto-dano');

    let fotos = [];
    let descricoesDanos = []; // Array para guardar os textos dos danos
    const LIMITE_OBRIGATORIO = 5;

    input.addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = function(event) {
            const fotoBase64 = event.target.result;
            
            // Se já passamos das fotos obrigatórias, salvamos o texto do dano
            if (fotos.length >= LIMITE_OBRIGATORIO) {
                const texto = descDanoInput.value.trim() || "Dano não especificado";
                descricoesDanos.push(texto);
                descDanoInput.value = ""; // Limpa para a próxima
            }

            fotos.push(fotoBase64);

            const imgTag = document.createElement('img');
            imgTag.src = fotoBase64;
            imgTag.className = 'preview-img';
            previewContainer.appendChild(imgTag);

            atualizarInterface();
        };
        reader.readAsDataURL(file);
        input.value = ""; 
    });

    function atualizarInterface() {
        const qtd = fotos.length;
        if (qtd < LIMITE_OBRIGATORIO) {
            status.innerText = `Foto ${qtd} de ${LIMITE_OBRIGATORIO} enviada.`;
            labelCamera.innerText = `📷 Tirar ${qtd + 1}ª Foto`;
            legenda.src = `foto_${qtd+1}.png`
        } else {
            legenda.src = `foto_6.png`
            status.innerText = "Fotos obrigatórias concluídas.";
            labelCamera.style.display = "none";
            btnExtra.style.display = "block";
            containerTextoDano.style.display = "block"; // Mostra o campo de texto
            areaFinalizacao.style.display = "block";
            btnPdf.style.display = "block";
        }
    }

    btnExtra.onclick = () => {
        if (descDanoInput.value.trim() === "") {
            alert("Por favor, descreva o dano no campo amarelo antes de tirar a foto.");
            descDanoInput.focus();
            return;
        }
        input.click();
    };

    async function gerarPDF() {
        const nomePessoa = document.getElementById('nome-pessoa').value;
        const numFuncional = document.getElementById('num-funcional').value;
        const nomeArquivo = document.getElementById('nome-arquivo').value;

        if (!nomePessoa || !numFuncional || !nomeArquivo) {
            alert("Preencha todos os campos antes de salvar.");
            return;
        }

        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        const pageWidth = doc.internal.pageSize.getWidth();

        // Cabeçalho
        doc.setFont("courier", "bold");
        doc.text("CHECK LIST DE VISTORIA", pageWidth / 2, 15, { align: "center" });

        // Dados do Formulário
        doc.setFontSize(10);
        let y = 30;
        const dados = new FormData(document.getElementById('vistoriaForm'));
        doc.text("RESULTADOS:", 10, y);
        y += 7;
        dados.forEach((valor, chave) => {
            switch(chave.toUpperCase()){

                case "PNEUS" : resultado = `Pneus em bom estado? ${valor.toUpperCase()}\n`;
                    break;
                case "LUZES" : resultado = `Luzes e faróis funcionando? ${valor.toUpperCase()}\n`;
                    break;   
                case "ESTEPE" : resultado = `Possui estepe e macaco? ${valor.toUpperCase()}\n`;
                    break;   
                case "VIDROS" : resultado = `Vidros sem trincas? ${valor.toUpperCase()}\n`;
                    break;
                case "NIVEIS" : resultado = `Nível de óleo/água OK? ${valor.toUpperCase()}\n`;
                    break;
            }
            doc.text(`${resultado}`, 15, y);
            y += 6;
        });

        // Fotos
        fotos.forEach((foto, index) => {
            doc.addPage();
            let legenda = "";
            
            if (index < 5) {
                const tipos = ["Frente", "Lado Direito", "Lado Esquerdo", "Traseira", "Estepe"];
                legenda = `Foto ${index + 1}: ${tipos[index]}`;
            } else {
                // Pega a descrição correta do array de danos (index - 5)
                const textoDano = descricoesDanos[index - 5];
                legenda = `DANO: ${textoDano}`;
            }

            doc.setFontSize(12);
            doc.text(legenda, 10, 15);
            doc.addImage(foto, 'JPEG', 10, 25, 190, 150); // Ajustei altura para não distorcer tanto
        });

        // Rodapé na última página
        doc.setFontSize(10);
        doc.text(`${nomePessoa}`, pageWidth / 2, 275, { align: "center", setFontSize: 14 });
        doc.text(`Nº Funcional/Identificação: ${numFuncional}`, pageWidth / 2, 282, { align: "center", setFontSize: 14 });

        doc.save(`${nomeArquivo}.pdf`);
    }
</script>

</body>
</html>
